<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrontendMentor: Tailwind</title>
    <link href="./css/style.css" rel="stylesheet" />
  </head>
  <body>

    <!-- Container principale-->
    <div class="my-15 mx-60">

      <header>
        <div class="flex justify-between items-center">
          <!-- Logo-->
          <div>
            <img
              class="p-5"
              src="./assets/images/logo.svg"
              alt="Logo della pagina"
            />
          </div>

          <!-- Navbar-->
          <div>
            <nav>
              <li class="flex justify-between">
                <ol class="w-30">
                  <a class="hover:text-orange-800 cursore-pointer" href="#">Home</a>
                </ol>
                <ol class="w-30">
                  <a class="hover:text-orange-800 cursore-pointer" href="#">News</a>
                </ol>
                <ol class=" w-30">
                  <a class="hover:text-orange-800 cursore-pointer" href="#">Popular</a>
                </ol>
                <ol class="w-30">
                  <a class="hover:text-orange-800 cursore-pointer" href="#">Trending</a>
                </ol>
                <ol class="w-30">
                  <a class="hover:text-orange-800 cursore-pointer" href="#">Categories</a>
                </ol>
              </li>
            </nav>
          </div>
        </div>
      </header>

      <main>
        <section>
          <div class="bg-pink-500 h-100 grid grid-cols-3 grid-rows-2 gap-5">
            <div class="bg-orange-500 col-span-2 row-span-1">1</div>
            <div class="bg-orange-500 col-span-1 row-span-2">2</div>
            <div class="bg-orange-500 col-span-1">3</div>
            <div class="bg-orange-500 col-span-1">4</div>
          </div>
        </section>

        <section>
          <div class="flex flex-column justify-between gap-5 mt-5">
            <div class="bg-red-500 flex w-[40%] h-50">1</div>
            <div class="bg-red-500 flex w-[40%] h-50">2</div>
            <div class="bg-red-500 flex w-[40%] h-50">3</div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
