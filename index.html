<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrontendMentor: Tailwind</title>
    <link href="./css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="bg-blue-600 my-15 mx-60">
      <header>
        <div class="h-20 bg-red-500 flex justify-between">
          <div class="bg-green-500">
            <img
              class="p-5"
              src="./assets/images/logo.svg"
              alt="Logo della pagina"
            />
          </div>
          <div class="bg-green-500 flex justify-between">
            <div class="bg-yellow-500 w-30">1</div>
            <div class="bg-yellow-500 w-30">2</div>
            <div class="bg-yellow-500 w-30">3</div>
            <div class="bg-yellow-500 w-30">4</div>
            <div class="bg-yellow-500 w-30">5</div>
          </div>
        </div>
      </header>

      <main>

        <section>
          <div class="bg-pink-500 h-100 grid grid-cols-3 grid-rows-2 gap-5">
            <div class="bg-orange-500 col-span-2 row-span-1">1</div>
            <div class="bg-orange-500 col-span-1 row-span-2">2</div>
            <div class="bg-orange-500 col-span-1">3</div>
            <div class="bg-orange-500 col-span-1">4</div>
          </div>
        </section>

        <section>
          <div class="flex flex-column justify-between gap-5 mt-5">
            <div class="bg-red-500 flex w-[40%] h-50">1</div>
            <div class="bg-red-500 flex w-[40%] h-50">2</div>
            <div class="bg-red-500 flex w-[40%] h-50">3</div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
